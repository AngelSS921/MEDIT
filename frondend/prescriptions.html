    <div class="main-full">
      <div class="back-btn-container">
        <button
          class="btn-back"
          onclick="location.href = 'patient_dashboard.html'"
        >
          ← Back to Dashboard
        </button>
      </div>
      <h1>📄 Prescriptions</h1>

      <div class="card">
        <h3>Upload Prescription (PDF Only)</h3>
        <form id="uploadForm" class="grid-form">
          <input type="file" id="fileInput" accept="application/pdf" required />
          <button type="submit">Upload Document</button>
        </form>
        <p id="uploadMessage"></p>
      </div>

      <div class="card">
        <h3>Recent Prescriptions</h3>
        <div class="table-container">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Uploaded By</th>
                <th>Date</th>
                <th>Download</th>
              </tr>
            </thead>
            <tbody id="prescriptionTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script src="js/authGuard.js"></script>
    <script src="js/prescriptionUpload.js"></script>
    <script src="js/prescriptionList.js"></script>
